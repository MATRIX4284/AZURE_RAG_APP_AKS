apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: azure-rag-app
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: myimage=kaustavcontainerregistry.azurecr.io/azure-rag-app
    argocd-image-updater.argoproj.io/myimage.update-strategy: latest
    argocd-image-updater.argoproj.io/myimage.allow-tags: |
      regexp:^[0-9a-f]{40}$
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: https://github.com/MATRIX4284/AZURE_RAG_APP_AKS.git # Update with your actual repo URL
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
