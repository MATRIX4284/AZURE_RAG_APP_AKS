apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-rag-app
  labels:
    app: azure-rag-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azure-rag-app
  template:
    metadata:
      labels:
        app: azure-rag-app
    spec:
      containers:
      - name: azure-rag-app
        image: kaustavcontainerregistry.azurecr.io/azure-rag-app:latest
        env:
        - name: AZURE_STORAGE_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: azure-rag-secrets
              key: AZURE_STORAGE_CONNECTION_STRING
        - name: AZURE_OPENAI_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: azure-rag-secrets
              key: AZURE_OPENAI_ENDPOINT
        - name: AZURE_OPENAI_API_VERSION
          valueFrom:
            secretKeyRef:
              name: azure-rag-secrets
              key: AZURE_OPENAI_API_VERSION
        - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
          valueFrom:
            secretKeyRef:
              name: azure-rag-secrets
              key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
